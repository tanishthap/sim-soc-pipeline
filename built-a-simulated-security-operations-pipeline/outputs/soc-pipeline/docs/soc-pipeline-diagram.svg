<svg width="1200" height="760" viewBox="0 0 1200 760" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Simulated SOC Pipeline Diagram</title>
  <desc id="desc">A workflow diagram showing structured logs flowing into a Python SOC pipeline, detection rules, IOC extraction, MITRE ATTACK mapping, severity scoring, and SOC reports.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#f8fafc"/>
      <stop offset="100%" stop-color="#eef6ff"/>
    </linearGradient>
    <linearGradient id="blue" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#2563eb"/>
      <stop offset="100%" stop-color="#0891b2"/>
    </linearGradient>
    <linearGradient id="green" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#059669"/>
      <stop offset="100%" stop-color="#16a34a"/>
    </linearGradient>
    <linearGradient id="orange" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#ea580c"/>
      <stop offset="100%" stop-color="#d97706"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="10" flood-color="#0f172a" flood-opacity="0.12"/>
    </filter>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M2,2 L10,6 L2,10 Z" fill="#475569"/>
    </marker>
    <style>
      .title { font: 700 34px Arial, Helvetica, sans-serif; fill: #0f172a; }
      .subtitle { font: 400 18px Arial, Helvetica, sans-serif; fill: #475569; }
      .box-title { font: 700 20px Arial, Helvetica, sans-serif; fill: #0f172a; }
      .box-text { font: 400 15px Arial, Helvetica, sans-serif; fill: #475569; }
      .white-title { font: 700 20px Arial, Helvetica, sans-serif; fill: #ffffff; }
      .white-text { font: 400 15px Arial, Helvetica, sans-serif; fill: #e0f2fe; }
      .label { font: 700 13px Arial, Helvetica, sans-serif; fill: #64748b; letter-spacing: 0.5px; }
      .line { stroke: #475569; stroke-width: 3; fill: none; marker-end: url(#arrow); }
      .soft-line { stroke: #94a3b8; stroke-width: 2.5; fill: none; marker-end: url(#arrow); stroke-dasharray: 8 7; }
    </style>
  </defs>

  <rect width="1200" height="760" rx="24" fill="url(#bg)"/>
  <text x="60" y="72" class="title">Simulated Security Operations Pipeline</text>
  <text x="60" y="104" class="subtitle">Python workflow for log analysis, detections, IOC extraction, MITRE mapping, triage, and SOC reporting</text>

  <g filter="url(#shadow)">
    <rect x="60" y="165" width="230" height="125" rx="16" fill="#ffffff" stroke="#cbd5e1"/>
    <text x="88" y="205" class="box-title">Structured Logs</text>
    <text x="88" y="236" class="box-text">CSV security events</text>
    <text x="88" y="260" class="box-text">auth, process, identity, network</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="360" y="165" width="230" height="125" rx="16" fill="#ffffff" stroke="#cbd5e1"/>
    <text x="388" y="205" class="box-title">Log Loader</text>
    <text x="388" y="236" class="box-text">Normalize timestamps</text>
    <text x="388" y="260" class="box-text">Create LogEvent objects</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="660" y="145" width="260" height="165" rx="16" fill="url(#blue)"/>
    <text x="690" y="190" class="white-title">Detection Engine</text>
    <text x="690" y="224" class="white-text">AUTH-001 brute force</text>
    <text x="690" y="248" class="white-text">PROC-001 suspicious commands</text>
    <text x="690" y="272" class="white-text">NET-001 beaconing</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="1000" y="165" width="140" height="125" rx="16" fill="#ffffff" stroke="#cbd5e1"/>
    <text x="1025" y="205" class="box-title">Alerts</text>
    <text x="1025" y="236" class="box-text">Rule hits</text>
    <text x="1025" y="260" class="box-text">Event evidence</text>
  </g>

  <path class="line" d="M290 228 H352"/>
  <path class="line" d="M590 228 H652"/>
  <path class="line" d="M920 228 H992"/>

  <g filter="url(#shadow)">
    <rect x="140" y="410" width="245" height="145" rx="16" fill="#ffffff" stroke="#cbd5e1"/>
    <text x="170" y="452" class="box-title">IOC Extraction</text>
    <text x="170" y="486" class="box-text">IP addresses</text>
    <text x="170" y="510" class="box-text">Domains</text>
    <text x="170" y="534" class="box-text">File hashes</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="475" y="410" width="245" height="145" rx="16" fill="#ffffff" stroke="#cbd5e1"/>
    <text x="505" y="452" class="box-title">MITRE Mapping</text>
    <text x="505" y="486" class="box-text">T1110 Brute Force</text>
    <text x="505" y="510" class="box-text">T1059 PowerShell</text>
    <text x="505" y="534" class="box-text">T1098 Account Changes</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="810" y="410" width="245" height="145" rx="16" fill="url(#orange)"/>
    <text x="840" y="452" class="white-title">Severity Scoring</text>
    <text x="840" y="486" class="white-text">Critical, High, Medium, Low</text>
    <text x="840" y="510" class="white-text">Priority queue P1 to P4</text>
    <text x="840" y="534" class="white-text">Risk-based triage</text>
  </g>

  <path class="soft-line" d="M760 310 C720 365 420 360 295 402"/>
  <path class="soft-line" d="M790 310 C800 365 655 370 610 402"/>
  <path class="soft-line" d="M1070 290 C1080 365 1030 385 965 402"/>
  <path class="line" d="M385 483 H467"/>
  <path class="line" d="M720 483 H802"/>

  <g filter="url(#shadow)">
    <rect x="305" y="625" width="255" height="90" rx="16" fill="url(#green)"/>
    <text x="335" y="665" class="white-title">Triage Queue</text>
    <text x="335" y="694" class="white-text">reports/triage_queue.csv</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="650" y="625" width="300" height="90" rx="16" fill="url(#green)"/>
    <text x="680" y="665" class="white-title">SOC Investigation Report</text>
    <text x="680" y="694" class="white-text">reports/soc_investigation_report.md</text>
  </g>

  <path class="line" d="M890 555 C835 600 645 610 540 640"/>
  <path class="line" d="M960 555 C940 600 895 610 860 625"/>

  <text x="60" y="705" class="label">OUTPUTS</text>
  <text x="60" y="725" class="box-text">alerts.json captures structured findings, triage_queue.csv ranks analyst work, and the Markdown report explains investigation context.</text>
</svg>
